AWSTemplateFormatVersion: "2010-09-09"
Transform: AWS::Serverless-2016-10-31
Description: >
  naver-map-review-telegram — 네이버 지도 리뷰 요약 Telegram 봇 (온디맨드 Webhook).
  사용자 메시지 → Telegram Webhook → API Gateway → 리뷰 수집·Claude 요약 → 응답 발송.

# ---------------------------------------------------------------------------
# 파라미터 (배포 시 --parameter-overrides 로 조정 가능)
# ---------------------------------------------------------------------------
Parameters:
  TablePrefix:
    Type: String
    Default: prod_
    Description: DynamoDB 테이블 접두사 (config.DYNAMO_TABLE_PREFIX 와 일치해야 함)
  SecretsName:
    Type: String
    Default: naver-review/production
    Description: Secrets Manager 시크릿 이름 (config.SECRETS_NAME 와 일치)

# ---------------------------------------------------------------------------
# 공통 함수 설정 (리전 ap-northeast-2, 런타임 python3.12)
# ---------------------------------------------------------------------------
Globals:
  Function:
    Runtime: python3.12
    MemorySize: 512
    Timeout: 300            # 5분 (수집·요약·발송 파이프라인 여유)
    Architectures:
      - x86_64

Resources:
  # -------------------------------------------------------------------------
  # 인바운드 Webhook 핸들러 Lambda + API Gateway(HTTP API) — 온디맨드 리뷰 요약
  # -------------------------------------------------------------------------
  WebhookFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: naver-review-webhook
      Handler: webhook_handler.lambda_handler
      CodeUri: .
      Description: Telegram Webhook 수신 → 명령 라우팅(/review) → 리뷰 요약 응답 발송
      Environment:
        Variables:
          # AWS_DEFAULT_REGION/AWS_REGION 은 Lambda 예약 키 — 런타임이 자동 주입하므로 설정 금지.
          # LOCAL_DEV 미설정(기본 false) → config 가 Secrets Manager 경로 사용.
          SECRETS_NAME: !Ref SecretsName
          DYNAMO_TABLE_PREFIX: !Ref TablePrefix
      Events:
        Webhook:
          # 암묵적 HttpApi(ServerlessHttpApi) 생성. 앱 레벨 secret token 검증이라 GW 인증 불요.
          Type: HttpApi
          Properties:
            Path: /webhook
            Method: post
      Policies:
        # 최소 권한: 리뷰 캐시 읽기/쓰기 + 시크릿 읽기
        - Statement:
            - Sid: DynamoDBAccess
              Effect: Allow
              Action:
                - dynamodb:GetItem
                - dynamodb:PutItem
              Resource:
                - !GetAtt ReviewCacheTable.Arn
            - Sid: SecretsManagerRead
              Effect: Allow
              Action:
                - secretsmanager:GetSecretValue
              Resource:
                - !Sub "arn:${AWS::Partition}:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:${SecretsName}-*"

  # -------------------------------------------------------------------------
  # DynamoDB — 리뷰/요약 캐시 (온디맨드 과금, PK=place_key, TTL 자동 만료)
  # -------------------------------------------------------------------------
  ReviewCacheTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub "${TablePrefix}review_cache"
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: place_key
          AttributeType: S
      KeySchema:
        - AttributeName: place_key
          KeyType: HASH
      TimeToLiveSpecification:
        AttributeName: ttl
        Enabled: true

# ---------------------------------------------------------------------------
# 출력
# ---------------------------------------------------------------------------
Outputs:
  WebhookApiUrl:
    Description: Telegram setWebhook에 등록할 인바운드 엔드포인트 URL
    Value: !Sub "https://${ServerlessHttpApi}.execute-api.${AWS::Region}.amazonaws.com/webhook"
  WebhookFunctionName:
    Description: Webhook 핸들러 함수명 (수동 test invoke 시 사용)
    Value: !Ref WebhookFunction
  ReviewCacheTableName:
    Description: 리뷰 캐시 테이블명
    Value: !Ref ReviewCacheTable
