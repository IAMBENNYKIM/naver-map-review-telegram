AWSTemplateFormatVersion: "2010-09-09"
Transform: AWS::Serverless-2016-10-31
Description: >
  naver-map-review-telegram — 네이버 지도 리뷰 요약 Telegram 봇 (2-Lambda 구조).
  Telegram Webhook → API Gateway → WebhookFunction(검증·즉답·비동기 invoke)
  → WorkerFunction(수집·Claude 분석·발송·캐시 저장).

# ---------------------------------------------------------------------------
# 파라미터 (배포 시 --parameter-overrides 로 조정 가능)
# ---------------------------------------------------------------------------
Parameters:
  TablePrefix:
    Type: String
    Default: prod_
    Description: DynamoDB 테이블 접두사 (config.DYNAMO_TABLE_PREFIX 와 일치해야 함)
  SecretsName:
    Type: String
    Default: naver-review/production
    Description: Secrets Manager 시크릿 이름 (config.SECRETS_NAME 와 일치)

# ---------------------------------------------------------------------------
# 공통 함수 설정 (리전 ap-northeast-2, 런타임 python3.12)
# ---------------------------------------------------------------------------
Globals:
  Function:
    Runtime: python3.12
    Architectures:
      - x86_64

Resources:
  # -------------------------------------------------------------------------
  # WebhookFunction — Telegram Webhook 수신·검증·즉답·WorkerFunction 비동기 invoke
  # -------------------------------------------------------------------------
  WebhookFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: naver-review-webhook
      Handler: webhook_handler.lambda_handler
      CodeUri: src/
      MemorySize: 256
      Timeout: 10
      Description: Telegram Webhook 수신 → 검증·파싱 → WorkerFunction 비동기 invoke → 즉답
      Environment:
        Variables:
          # AWS_DEFAULT_REGION/AWS_REGION 은 Lambda 예약 키 — 런타임이 자동 주입하므로 설정 금지.
          # LOCAL_DEV 미설정(기본 false) → config 가 Secrets Manager 경로 사용.
          SECRETS_NAME: !Ref SecretsName
          DYNAMO_TABLE_PREFIX: !Ref TablePrefix
          WORKER_FUNCTION_NAME: !Ref WorkerFunction
      Events:
        Webhook:
          # 암묵적 HttpApi(ServerlessHttpApi) 생성. 앱 레벨 secret token 검증이라 GW 인증 불요.
          Type: HttpApi
          Properties:
            Path: /webhook
            Method: post
      Policies:
        # 최소 권한: WorkerFunction 비동기 invoke + 시크릿 읽기
        - Statement:
            - Sid: InvokeWorkerFunction
              Effect: Allow
              Action:
                - lambda:InvokeFunction
              Resource:
                - !GetAtt WorkerFunction.Arn
            - Sid: SecretsManagerRead
              Effect: Allow
              Action:
                - secretsmanager:GetSecretValue
              Resource:
                - !Sub "arn:${AWS::Partition}:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:${SecretsName}-*"

  # -------------------------------------------------------------------------
  # WorkerFunction — place 해석·리뷰 수집·Claude 분석·발송·캐시 저장 (무거운 파이프라인)
  # -------------------------------------------------------------------------
  WorkerFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: naver-review-worker
      Handler: worker_handler.lambda_handler
      CodeUri: src/
      MemorySize: 512
      Timeout: 120
      Description: place 해석 → 캐시 조회 → 수집 → Claude 분석 → 발송 → 캐시 저장
      Environment:
        Variables:
          SECRETS_NAME: !Ref SecretsName
          DYNAMO_TABLE_PREFIX: !Ref TablePrefix
      Policies:
        # 최소 권한: 리뷰 캐시 읽기/쓰기(ReviewCacheTable 한정) + 시크릿 읽기
        - Statement:
            - Sid: DynamoDBAccess
              Effect: Allow
              Action:
                - dynamodb:GetItem
                - dynamodb:PutItem
              Resource:
                - !GetAtt ReviewCacheTable.Arn
            - Sid: SecretsManagerRead
              Effect: Allow
              Action:
                - secretsmanager:GetSecretValue
              Resource:
                - !Sub "arn:${AWS::Partition}:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:${SecretsName}-*"

  # -------------------------------------------------------------------------
  # DynamoDB — 리뷰 요약 캐시 (온디맨드 과금, PK=place_key, TTL 미사용 — 만료 없음)
  # -------------------------------------------------------------------------
  ReviewCacheTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub "${TablePrefix}review_cache"
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: place_key
          AttributeType: S
      KeySchema:
        - AttributeName: place_key
          KeyType: HASH

# ---------------------------------------------------------------------------
# 출력
# ---------------------------------------------------------------------------
Outputs:
  WebhookApiUrl:
    Description: Telegram setWebhook에 등록할 인바운드 엔드포인트 URL
    Value: !Sub "https://${ServerlessHttpApi}.execute-api.${AWS::Region}.amazonaws.com/webhook"
  WebhookFunctionName:
    Description: Webhook 핸들러 함수명 (수동 test invoke 시 사용)
    Value: !Ref WebhookFunction
  WorkerFunctionName:
    Description: Worker 함수명 (WebhookFunction 환경변수·수동 test invoke 시 사용)
    Value: !Ref WorkerFunction
  ReviewCacheTableName:
    Description: 리뷰 캐시 테이블명
    Value: !Ref ReviewCacheTable
